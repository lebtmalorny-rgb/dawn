---
- name: Validate Cloud UI role inputs
  ansible.builtin.include_tasks: validate.yml

- name: Publish Cloud UI lifecycle contract
  ansible.builtin.include_tasks: lifecycle.yml

- name: Prepare Cloud UI config templates
  ansible.builtin.include_tasks: config.yml
  when: cloud_ui_enabled | bool

- name: Define Cloud UI one-shot migration job data
  ansible.builtin.include_tasks: migration.yml

- name: Define Cloud UI container data
  ansible.builtin.include_tasks: containers.yml

- name: Apply Cloud UI live all-in-one containers
  ansible.builtin.include_tasks: live-aio.yml
  when: cloud_ui_aio_live_reconfigure_enabled | bool
