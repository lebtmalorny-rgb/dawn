---
- name: Ensure Cloud UI config directories exist
  ansible.builtin.file:
    path: "{{ cloud_ui_config_root }}/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - cloud-ui-backend
    - cloud-ui-frontend
    - cloud-ui-haproxy

- name: Render Cloud UI backend runtime environment
  ansible.builtin.template:
    src: cloud-ui-backend.env.j2
    dest: "{{ cloud_ui_config_root }}/cloud-ui-backend/cloud-ui-backend.env"
    mode: "0640"
  no_log: true
  notify:
    - Restart Cloud UI containers

- name: Render Cloud UI frontend runtime config
  ansible.builtin.template:
    src: cloud-ui-frontend.conf.j2
    dest: "{{ cloud_ui_config_root }}/cloud-ui-frontend/nginx.conf"
    mode: "0640"
  notify:
    - Restart Cloud UI containers

- name: Render Cloud UI HAProxy route contract
  ansible.builtin.template:
    src: cloud-ui-haproxy.cfg.j2
    dest: "{{ cloud_ui_config_root }}/cloud-ui-haproxy/cloud-ui-haproxy.cfg"
    mode: "0640"
  when: cloud_ui_haproxy_enabled | bool
