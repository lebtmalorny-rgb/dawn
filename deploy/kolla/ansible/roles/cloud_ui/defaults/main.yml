---
cloud_ui_enabled: false

cloud_ui_config_version: "e09.7-reconfigure-rollback"
cloud_ui_external_scheme: "https"
cloud_ui_external_fqdn: "cloud-ui.example.invalid"
cloud_ui_public_base_url: "{{ cloud_ui_external_scheme }}://{{ cloud_ui_external_fqdn }}/"
cloud_ui_api_public_path: "/api/v1/"
cloud_ui_log_level: "INFO"

cloud_ui_haproxy_enabled: false
cloud_ui_haproxy_bind_address: "{{ kolla_external_vip_address }}"
cloud_ui_haproxy_external_port: 443
cloud_ui_haproxy_tls_cert_bundle_path: "/etc/kolla/certificates/cloud-ui-haproxy.pem"
cloud_ui_haproxy_tls_min_version: "TLSv1.2"
cloud_ui_haproxy_backend_tls_mode: "internal_http"
cloud_ui_haproxy_backend_tls_mode_allowed:
  - internal_http
  - backend_tls
  - backend_mtls
cloud_ui_haproxy_backend_ca_path: "/etc/kolla/certificates/ca/root.crt"
cloud_ui_haproxy_backend_client_cert_path: "/etc/kolla/certificates/cloud-ui-haproxy-client.crt"
cloud_ui_haproxy_backend_client_key_path: "/etc/kolla/certificates/cloud-ui-haproxy-client.key"
cloud_ui_haproxy_backend_scheme: "http"
cloud_ui_haproxy_frontend_scheme: "http"
cloud_ui_haproxy_timeouts:
  connect: "5s"
  client: "60s"
  server: "60s"
  http_request: "10s"
cloud_ui_haproxy_max_body_bytes: 16777216
cloud_ui_haproxy_trusted_proxy_headers:
  - X-Forwarded-For
  - X-Forwarded-Proto
  - X-Forwarded-Host
  - X-Request-ID
cloud_ui_haproxy_security_headers:
  X-Content-Type-Options: "nosniff"
  X-Frame-Options: "DENY"
  Referrer-Policy: "no-referrer"
cloud_ui_management_network_acl_required: true
cloud_ui_management_network_acl_status: "pending_external_evidence"
cloud_ui_forbidden_network_flows:
  - browser_to_openstack_api
  - browser_to_database
  - browser_to_rabbitmq
  - browser_to_vault
  - frontend_to_openstack_service_database
  - portal_consumer_to_openstack_rpc_wildcard
cloud_ui_haproxy_routes:
  - name: cloud_ui_api
    path_prefix: "{{ cloud_ui_api_public_path }}"
    service: cloud_ui_api
    backend: cloud_ui_api
    health_check_path: "/api/v1/health/ready"
    upstream_scheme: "{{ cloud_ui_haproxy_backend_scheme }}"
    upstream_port: "{{ cloud_ui_backend_listen_port }}"
  - name: cloud_ui_frontend
    path_prefix: "/"
    service: cloud_ui_frontend
    backend: cloud_ui_frontend
    health_check_path: "/"
    upstream_scheme: "{{ cloud_ui_haproxy_frontend_scheme }}"
    upstream_port: "{{ cloud_ui_frontend_listen_port }}"

cloud_ui_lifecycle_contract_version: "e09.7-reconfigure-rollback"
cloud_ui_lifecycle_dry_run_only: true
cloud_ui_lifecycle_live_execution_status: "pending_external_evidence"
cloud_ui_lifecycle_required_evidence:
  - test_inventory_approved
  - registry_digest_pull
  - migration_precheck_and_run_once
  - reconfigure_idempotency
  - rolling_update
  - failed_update_rollback
  - disable_uninstall
  - container_inspection

cloud_ui_deploy_reconfigure_phase_order:
  - precheck
  - confirm_backup_and_rollback_window
  - pull_images_by_digest
  - migration_precheck
  - migration_run_once
  - render_config
  - apply_permanent_containers
  - apply_haproxy_route
  - smoke
  - reconfigure_idempotency_check
  - record_evidence
cloud_ui_deploy_reconfigure_phases:
  - name: precheck
    gate: "validate role inputs, test inventory and target groups"
  - name: confirm_backup_and_rollback_window
    gate: "operator confirms backup point and rollback window"
  - name: pull_images_by_digest
    requires:
      - cloud_ui_backend_image_digest
      - cloud_ui_frontend_image_digest
  - name: migration_precheck
    command: "cloud-ui db-upgrade --check"
    gate: "schema is reachable and migration can acquire lock"
  - name: migration_run_once
    command: "cloud-ui db-upgrade"
    run_once: true
    gate: "expand-compatible migration only"
  - name: render_config
    target: "cloud_ui_config_root"
  - name: apply_permanent_containers
    target: "cloud_ui_process_topology"
    gate: "three nodes x four permanent services"
  - name: apply_haproxy_route
    target: "cloud_ui_haproxy_routes"
  - name: smoke
    target: "cloud-ui smoke"
  - name: reconfigure_idempotency_check
    expected_change: 0
  - name: record_evidence
    evidence: "docs/generated/e09-reconfigure-rollback.md"

cloud_ui_rolling_upgrade_phase_order:
  - precheck
  - assert_rollback_window
  - pull_new_images_by_digest
  - run_expand_migration
  - roll_backend_api
  - roll_backend_worker_events
  - roll_frontend
  - haproxy_health_gate
  - compatibility_smoke
  - hold_contract_migration
  - record_upgrade_evidence
cloud_ui_rolling_upgrade_phases:
  - name: precheck
    gate: "validate current version, target version and compatibility window"
  - name: assert_rollback_window
    gate: "rollback window is open and documented"
  - name: pull_new_images_by_digest
    requires:
      - cloud_ui_backend_image_digest
      - cloud_ui_frontend_image_digest
  - name: run_expand_migration
    command: "cloud-ui db-upgrade"
    run_once: true
  - name: roll_backend_api
    service: cloud_ui_api
    strategy: rolling
  - name: roll_backend_worker_events
    services:
      - cloud_ui_worker
      - cloud_ui_events
    strategy: rolling
  - name: roll_frontend
    service: cloud_ui_frontend
    strategy: rolling
  - name: haproxy_health_gate
    health_paths:
      - /
      - /api/v1/health/ready
  - name: compatibility_smoke
    command: "cloud-ui smoke"
  - name: hold_contract_migration
    contract_migration_allowed: false
    gate: "wait until rollback window closes"
  - name: record_upgrade_evidence
    evidence: "docs/generated/e09-reconfigure-rollback.md"

cloud_ui_failed_update_rollback_phase_order:
  - stop_new_rollout
  - restore_previous_config_commit
  - rollback_frontend_image
  - rollback_backend_image
  - rerun_reconfigure
  - smoke_previous_version
  - preserve_operations_and_audit
  - record_rollback_evidence
cloud_ui_failed_update_rollback_phases:
  - name: stop_new_rollout
    requires:
      - failed_health_gate_or_operator_abort
  - name: restore_previous_config_commit
    source: "Git commit recorded before rollout"
  - name: rollback_frontend_image
    image: "{{ cloud_ui_frontend_image_full }}"
  - name: rollback_backend_image
    image: "{{ cloud_ui_backend_image_full }}"
  - name: rerun_reconfigure
    mode: "test inventory only"
  - name: smoke_previous_version
    command: "cloud-ui smoke"
  - name: preserve_operations_and_audit
    preserve:
      - operations
      - audit_events
      - read_model
      - queued_messages
  - name: record_rollback_evidence
    evidence: "docs/generated/e09-reconfigure-rollback.md"

cloud_ui_rollback_decision_table:
  - condition: schema_expand_only
    rollback_allowed: true
    required_action: "restore previous image digests and config commit"
  - condition: image_pull_failed
    rollback_allowed: true
    required_action: "retry previous digest or abort before rollout"
  - condition: haproxy_smoke_failed
    rollback_allowed: true
    required_action: "restore previous HAProxy route and image digests"
  - condition: contract_migration_applied
    rollback_allowed: false
    required_action: "restore_from_approved_backup_or_forward_fix"

cloud_ui_disable_uninstall_policy:
  disable_flag: "cloud_ui_enabled=false"
  stop_order:
    - remove_haproxy_route
    - stop_frontend
    - stop_api
    - stop_worker
    - stop_events
  preserve_database: true
  preserve_rabbitmq: true
  preserve_vault_paths: true
  preserve_logs: true
  destructive_cleanup_requires_approval: true
  cleanup_status: "pending_external_approval"

cloud_ui_permanent_container_count_per_node: 4
cloud_ui_expected_control_ui_node_count: 3
cloud_ui_expected_permanent_containers_total: 12
cloud_ui_control_ui_nodes:
  - control-ui-01
  - control-ui-02
  - control-ui-03

cloud_ui_frontend_group: "cloud-ui-frontend"
cloud_ui_api_group: "cloud-ui-api"
cloud_ui_worker_group: "cloud-ui-worker"
cloud_ui_events_group: "cloud-ui-events"

cloud_ui_registry: "{{ kolla_internal_fqdn | default('registry.test.example.invalid/cloud-ui') }}"
cloud_ui_backend_image: "cloud-ui-backend"
cloud_ui_frontend_image: "cloud-ui-frontend"
cloud_ui_backend_image_tag: "{{ openstack_tag | default('2025.1-rocky-9') }}"
cloud_ui_frontend_image_tag: "{{ openstack_tag | default('2025.1-rocky-9') }}"
cloud_ui_backend_image_digest: ""
cloud_ui_frontend_image_digest: ""
cloud_ui_backend_image_full: "{{ cloud_ui_registry }}/{{ cloud_ui_backend_image }}{% if cloud_ui_backend_image_digest | length > 0 %}@{{ cloud_ui_backend_image_digest }}{% else %}:{{ cloud_ui_backend_image_tag }}{% endif %}"
cloud_ui_frontend_image_full: "{{ cloud_ui_registry }}/{{ cloud_ui_frontend_image }}{% if cloud_ui_frontend_image_digest | length > 0 %}@{{ cloud_ui_frontend_image_digest }}{% else %}:{{ cloud_ui_frontend_image_tag }}{% endif %}"

cloud_ui_config_root: "{{ node_config_directory | default('/etc/kolla') }}"
cloud_ui_container_config_directory: "{{ container_config_directory | default('/var/lib/kolla/config_files') }}"
cloud_ui_log_volume: "kolla_logs"

cloud_ui_backend_listen_port: 8080
cloud_ui_frontend_listen_port: 8080

cloud_ui_migration_enabled: false
cloud_ui_migration_log_path: "/var/log/kolla/cloud-ui/db-upgrade.log"

cloud_ui_backend_dimensions:
  cap_drop:
    - ALL
  read_only: true
  pids_limit: 512
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

cloud_ui_frontend_dimensions:
  cap_drop:
    - ALL
  read_only: true
  pids_limit: 256
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

cloud_ui_services:
  cloud_ui_frontend:
    container_name: "cloud_ui_frontend"
    group: "{{ cloud_ui_frontend_group }}"
    enabled: "{{ cloud_ui_enabled }}"
    image: "{{ cloud_ui_frontend_image_full }}"
    command: "nginx -g 'daemon off;'"
    listen_port: "{{ cloud_ui_frontend_listen_port }}"
    config_dir: "cloud-ui-frontend"
    dimensions: "{{ cloud_ui_frontend_dimensions }}"
    volumes:
      - "{{ cloud_ui_config_root }}/cloud-ui-frontend/:{{ cloud_ui_container_config_directory }}/:ro"
      - "{{ cloud_ui_log_volume }}:/var/log/kolla/"
  cloud_ui_api:
    container_name: "cloud_ui_api"
    group: "{{ cloud_ui_api_group }}"
    enabled: "{{ cloud_ui_enabled }}"
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui api"
    listen_port: "{{ cloud_ui_backend_listen_port }}"
    config_dir: "cloud-ui-backend"
    dimensions: "{{ cloud_ui_backend_dimensions }}"
    volumes:
      - "{{ cloud_ui_config_root }}/cloud-ui-backend/:{{ cloud_ui_container_config_directory }}/:ro"
      - "{{ cloud_ui_log_volume }}:/var/log/kolla/"
  cloud_ui_worker:
    container_name: "cloud_ui_worker"
    group: "{{ cloud_ui_worker_group }}"
    enabled: "{{ cloud_ui_enabled }}"
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui worker"
    config_dir: "cloud-ui-backend"
    dimensions: "{{ cloud_ui_backend_dimensions }}"
    volumes:
      - "{{ cloud_ui_config_root }}/cloud-ui-backend/:{{ cloud_ui_container_config_directory }}/:ro"
      - "{{ cloud_ui_log_volume }}:/var/log/kolla/"
  cloud_ui_events:
    container_name: "cloud_ui_events"
    group: "{{ cloud_ui_events_group }}"
    enabled: "{{ cloud_ui_enabled }}"
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui events"
    config_dir: "cloud-ui-backend"
    dimensions: "{{ cloud_ui_backend_dimensions }}"
    volumes:
      - "{{ cloud_ui_config_root }}/cloud-ui-backend/:{{ cloud_ui_container_config_directory }}/:ro"
      - "{{ cloud_ui_log_volume }}:/var/log/kolla/"

cloud_ui_migration_job:
  container_name: "cloud_ui_db_migrate"
  group: "{{ cloud_ui_api_group }}"
  enabled: "{{ cloud_ui_migration_enabled }}"
  image: "{{ cloud_ui_backend_image_full }}"
  command: "cloud-ui db-upgrade"
  config_dir: "cloud-ui-backend"
  dimensions: "{{ cloud_ui_backend_dimensions }}"
  restart_policy: "no"
  run_once: true
  volumes:
    - "{{ cloud_ui_config_root }}/cloud-ui-backend/:{{ cloud_ui_container_config_directory }}/:ro"
    - "{{ cloud_ui_log_volume }}:/var/log/kolla/"

cloud_ui_migration_execution_policy:
  run_once: true
  lock_required: true
  precheck_required: true
  api_auto_migration_allowed: false
  rollback_window_required: true
  retry_on_failure: false
  max_attempts: 1
  precheck_command: "cloud-ui db-upgrade --check"
  upgrade_command: "cloud-ui db-upgrade"
  log_path: "/var/log/kolla/cloud-ui/db-upgrade.log"

cloud_ui_process_topology:
  - node: control-ui-01
    service: cloud_ui_frontend
    process: frontend
    container_name: cloud_ui_frontend_control-ui-01
    image: "{{ cloud_ui_frontend_image_full }}"
    command: "nginx -g 'daemon off;'"
    config_dir: cloud-ui-frontend
    permanent: true
  - node: control-ui-01
    service: cloud_ui_api
    process: api
    container_name: cloud_ui_api_control-ui-01
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui api"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-01
    service: cloud_ui_worker
    process: worker
    container_name: cloud_ui_worker_control-ui-01
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui worker"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-01
    service: cloud_ui_events
    process: events
    container_name: cloud_ui_events_control-ui-01
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui events"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-02
    service: cloud_ui_frontend
    process: frontend
    container_name: cloud_ui_frontend_control-ui-02
    image: "{{ cloud_ui_frontend_image_full }}"
    command: "nginx -g 'daemon off;'"
    config_dir: cloud-ui-frontend
    permanent: true
  - node: control-ui-02
    service: cloud_ui_api
    process: api
    container_name: cloud_ui_api_control-ui-02
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui api"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-02
    service: cloud_ui_worker
    process: worker
    container_name: cloud_ui_worker_control-ui-02
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui worker"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-02
    service: cloud_ui_events
    process: events
    container_name: cloud_ui_events_control-ui-02
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui events"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-03
    service: cloud_ui_frontend
    process: frontend
    container_name: cloud_ui_frontend_control-ui-03
    image: "{{ cloud_ui_frontend_image_full }}"
    command: "nginx -g 'daemon off;'"
    config_dir: cloud-ui-frontend
    permanent: true
  - node: control-ui-03
    service: cloud_ui_api
    process: api
    container_name: cloud_ui_api_control-ui-03
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui api"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-03
    service: cloud_ui_worker
    process: worker
    container_name: cloud_ui_worker_control-ui-03
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui worker"
    config_dir: cloud-ui-backend
    permanent: true
  - node: control-ui-03
    service: cloud_ui_events
    process: events
    container_name: cloud_ui_events_control-ui-03
    image: "{{ cloud_ui_backend_image_full }}"
    command: "cloud-ui events"
    config_dir: cloud-ui-backend
    permanent: true
