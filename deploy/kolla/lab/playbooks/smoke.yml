---
- name: Smoke Dawn lab containers
  hosts: cloud_ui_aio
  gather_facts: false
  tasks:
    - name: Wait for Dawn API liveness
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ cloud_ui_api_port }}/health/live"
        method: GET
        status_code: 200
        return_content: true
      register: api_live
      retries: 30
      delay: 2
      until: api_live.status == 200 and (api_live.json.status | default('')) == "ok"

    - name: Wait for Dawn API readiness
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ cloud_ui_api_port }}/api/v1/health/ready"
        method: GET
        status_code: 200
        return_content: true
      register: api_ready
      retries: 30
      delay: 2
      until: api_ready.status == 200 and (api_ready.json.status | default('')) == "ok"

    - name: Wait for Dawn frontend response
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ cloud_ui_frontend_port }}/"
        method: GET
        status_code: 200
      register: frontend_response
      retries: 30
      delay: 2
      until: frontend_response.status == 200

    - name: List Dawn lab containers
      ansible.builtin.command:
        argv:
          - "{{ cloud_ui_aio_engine }}"
          - ps
          - --filter
          - name=cloud_ui_
          - --format
          - "{{ '{{' }}.Names{{ '}}' }} {{ '{{' }}.Image{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}"
      register: cloud_ui_ps
      changed_when: false

    - name: Assert Dawn lab containers are running expected images
      ansible.builtin.assert:
        that:
          - >-
            (cloud_ui_ps.stdout_lines
            | select('match', '^' ~ item.name ~ '\\s+' ~ (item.image | regex_escape) ~ '\\s+')
            | list
            | length) == 1
        fail_msg: >-
          Missing running Dawn lab container image pair:
          {{ item.name }} {{ item.image }}
      loop:
        - name: cloud_ui_api
          image: "{{ cloud_ui_backend_image }}"
        - name: cloud_ui_worker
          image: "{{ cloud_ui_backend_image }}"
        - name: cloud_ui_events
          image: "{{ cloud_ui_backend_image }}"
        - name: cloud_ui_frontend
          image: "{{ cloud_ui_frontend_image }}"

    - name: Wait for Dawn lab container health checks
      ansible.builtin.command:
        argv:
          - "{{ cloud_ui_aio_engine }}"
          - inspect
          - --format
          - "{{ '{{' }}if .State.Health{{ '}}' }}{{ '{{' }}.State.Health.Status{{ '}}' }}{{ '{{' }}else{{ '}}' }}missing{{ '{{' }}end{{ '}}' }}"
          - "{{ item }}"
      register: cloud_ui_health_status
      changed_when: false
      retries: 12
      delay: 5
      until: cloud_ui_health_status.stdout == "healthy"
      loop:
        - cloud_ui_api
        - cloud_ui_worker
        - cloud_ui_events
        - cloud_ui_frontend

    - name: Collect Dawn lab container logs for secret scan
      ansible.builtin.command:
        argv:
          - "{{ cloud_ui_aio_engine }}"
          - logs
          - --tail
          - "500"
          - "{{ item }}"
      register: cloud_ui_container_logs
      changed_when: false
      no_log: true
      loop:
        - cloud_ui_api
        - cloud_ui_worker
        - cloud_ui_events
        - cloud_ui_frontend

    - name: Assert Dawn logs do not expose supplied secret URLs
      ansible.builtin.assert:
        that:
          - >-
            cloud_ui_database_url not in
            ((cloud_ui_container_logs.results | map(attribute='stdout') | join('\n')) ~ '\n' ~
            (cloud_ui_container_logs.results | map(attribute='stderr') | join('\n')))
          - >-
            cloud_ui_rabbitmq_url not in
            ((cloud_ui_container_logs.results | map(attribute='stdout') | join('\n')) ~ '\n' ~
            (cloud_ui_container_logs.results | map(attribute='stderr') | join('\n')))
        fail_msg: "Dawn lab container logs contain a supplied secret URL."
      no_log: true
